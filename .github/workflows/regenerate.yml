name: Regenerate the Grammar

on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regenerate:
    name: Regenerate the parser
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - name: Install tree-sitter
      run: brew update && brew install tree-sitter
    - name: Regenerate the parser
      run: tree-sitter generate
    - name: Generate a patch
      run: |
        git config user.name 'Autogenerated' &&
        git config user.email 'autogenerated@ci' &&
        git add . &&
        git commit -m 'Regenerated' &&
        git format-patch HEAD~ -o regenerated/
    - name: Upload the changes
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: regenerated
        path: regenerated/
